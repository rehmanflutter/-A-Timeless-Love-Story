name: amore_app
description: "Amore — A beautiful romantic love story Flutter app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State / UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  visibility_detector: ^0.4.0+2

  # Web-only (conditional import handles platform check)
  flutter_web_plugins:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
